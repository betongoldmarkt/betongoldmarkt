backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "angebote"
    label: "Immobilien"
    folder: "angebote"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Preis", name: "price", widget: "string" }
      - { label: "Beschreibung", name: "body", widget: "text" }
      - { label: "Foto", name: "image", widget: "image" }
